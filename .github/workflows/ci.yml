name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      # Headless Chrome is pre-installed on the runner; the built-in
      # ChromeHeadlessNoSandbox launcher adds the flags CI needs.
      - name: Unit tests
        run: npm run test:ci

      - name: Production build
        run: npm run build
