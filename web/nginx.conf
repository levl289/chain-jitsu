server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip text assets.
    gzip              on;
    gzip_types        text/plain text/css application/javascript application/json text/csv image/svg+xml;
    gzip_min_length   1024;

    # Long-cache the hashed build artifacts.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The card deck / user list should not be cached hard so instructor edits
    # (a redeploy of the image) take effect immediately.
    location /data/ {
        add_header Cache-Control "no-cache";
        types {
            text/csv         csv;
            application/json json;
        }
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
